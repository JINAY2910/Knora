<!DOCTYPE html>
<html>
<head>
<style>
  .box {
    width: 200px;
    height: 100px;
    background: #333;
    position: relative;
    /* overflow: hidden; */
    padding: 20px;
    margin: 50px;
    box-shadow: 4px 4px 0px 0px red;
  }
  .circle {
    position: absolute;
    top: -16px;
    right: -16px;
    width: 64px;
    height: 64px;
    background: rgba(255,0,0,0.5);
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="circle"></div>
  </div>
</body>
</html>
